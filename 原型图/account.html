<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>账号设置 - 戒烟小程序</title>
    <style>
        :root {
            --primary-color: #1ABC9C;
            --secondary-color: #16A085;
            --white: #FFFFFF;
            --text-dark: #333333;
            --text-gray: #666666;
            --border-color: #E0E0E0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #F5F5F5;
            color: var(--text-dark);
            line-height: 1.6;
        }

        .container {
            max-width: 100%;
            min-height: 100vh;
            padding: 0;
        }

        .header {
            background: var(--primary-color);
            color: var(--white);
            padding: 16px;
            text-align: center;
            position: relative;
        }

        .back-btn {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--white);
            font-size: 18px;
            cursor: pointer;
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
        }

        .content {
            padding: 16px;
            text-align: center;
        }

        .placeholder {
            background: var(--white);
            padding: 40px 20px;
            border-radius: 12px;
            margin: 20px 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .placeholder-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .placeholder-text {
            font-size: 16px;
            color: var(--text-gray);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-btn" onclick="goBack()">←</button>
            <div class="header-title">账号设置</div>
        </div>

        <div class="content">
            <div class="placeholder">
                <div class="placeholder-icon">👤</div>
                <div class="placeholder-text">账号设置页面正在开发中...</div>
            </div>
        </div>
    </div>

    <script>
        function goBack() {
            window.history.back();
        }
    </script>
</body>
</html>
