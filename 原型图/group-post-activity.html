<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发布动态 - 戒烟小程序</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #1ABC9C;
            --accent-orange: #F39C12;
            --text-dark: #2C3E50;
            --text-gray: #5D6D7E;
            --background-light: #F8F9FA;
            --white: #FFFFFF;
            --success-green: #27AE60;
            --error-red: #E74C3C;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--background-light);
            color: var(--text-dark);
            min-height: 100vh;
            padding-bottom: 60px;
        }

        /* 沉浸式状态栏 */
        .status-bar {
            background: var(--primary-color);
            color: var(--white);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        /* 页面头部 */
        .page-header {
            background: var(--white);
            padding: 16px 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .page-title {
            font-size: 18px;
            font-weight: 600;
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            color: var(--text-gray);
        }

        .post-btn {
            background: var(--primary-color);
            color: var(--white);
            border: none;
            padding: 8px 16px;
            border-radius: 16px;
            font-size: 14px;
            cursor: pointer;
        }

        .post-btn:disabled {
            background: var(--text-gray);
            cursor: not-allowed;
        }

        /* 发布表单 */
        .post-form {
            background: var(--white);
            padding: 20px;
            margin-bottom: 12px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            color: var(--text-gray);
            margin-bottom: 8px;
        }

        .form-textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            resize: vertical;
            min-height: 120px;
            font-family: inherit;
        }

        .form-textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .char-count {
            font-size: 12px;
            color: var(--text-gray);
            text-align: right;
            margin-top: 4px;
        }

        .char-count.warning {
            color: var(--accent-orange);
        }

        .char-count.error {
            color: var(--error-red);
        }

        /* 表情选择 */
        .emoji-section {
            background: var(--white);
            padding: 20px;
            margin-bottom: 12px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-dark);
        }

        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
        }

        .emoji-item {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: var(--background-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .emoji-item:hover {
            background: var(--primary-color);
            transform: scale(1.1);
        }

        /* 图片上传 */
        .image-section {
            background: var(--white);
            padding: 20px;
            margin-bottom: 12px;
        }

        .image-upload {
            border: 2px dashed #ddd;
            border-radius: 8px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .image-upload:hover {
            border-color: var(--primary-color);
        }

        .upload-icon {
            font-size: 32px;
            color: var(--text-gray);
            margin-bottom: 8px;
        }

        .upload-text {
            font-size: 14px;
            color: var(--text-gray);
        }

        .image-preview {
            display: none;
            margin-top: 12px;
            text-align: center;
        }

        .preview-image {
            max-width: 200px;
            max-height: 200px;
            border-radius: 8px;
        }

        /* 底部导航栏 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--white);
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            border-top: 1px solid #eee;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 8px 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 8px;
            min-width: 60px;
            color: var(--text-gray);
        }

        .nav-item.active {
            color: var(--primary-color);
        }

        .nav-icon {
            font-size: 20px;
            margin-bottom: 4px;
            font-weight: 300;
        }

        .nav-text {
            font-size: 10px;
        }

        /* 动画效果 */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeIn 0.6s ease-out;
        }
    </style>
</head>
<body>
    <!-- 沉浸式状态栏 -->
    <div class="status-bar">
        <span>9:41</span>
        <div>📶 100% 🔋</div>
    </div>

    <!-- 页面头部 -->
    <div class="page-header">
        <button class="back-btn" onclick="goBack()">← 返回</button>
        <div class="page-title">发布动态</div>
        <button class="post-btn" id="postBtn" onclick="postActivity()" disabled>发布</button>
    </div>

    <!-- 发布表单 -->
    <div class="post-form fade-in">
        <div class="form-group">
            <label class="form-label">分享你的戒烟心得</label>
            <textarea class="form-textarea" id="activityContent" placeholder="今天戒烟有什么感受？遇到了什么挑战？有什么经验想分享？" maxlength="500"></textarea>
            <div class="char-count" id="charCount">0/500</div>
        </div>
    </div>

    <!-- 表情选择 -->
    <div class="emoji-section fade-in">
        <div class="section-title">😊 添加表情</div>
        <div class="emoji-grid">
            <div class="emoji-item" onclick="addEmoji('😊')">😊</div>
            <div class="emoji-item" onclick="addEmoji('👍')">👍</div>
            <div class="emoji-item" onclick="addEmoji('💪')">💪</div>
            <div class="emoji-item" onclick="addEmoji('🎉')">🎉</div>
            <div class="emoji-item" onclick="addEmoji('❤️')">❤️</div>
            <div class="emoji-item" onclick="addEmoji('🔥')">🔥</div>
            <div class="emoji-item" onclick="addEmoji('🌈')">🌈</div>
            <div class="emoji-item" onclick="addEmoji('🌟')">🌟</div>
            <div class="emoji-item" onclick="addEmoji('🚭')">🚭</div>
            <div class="emoji-item" onclick="addEmoji('💯')">💯</div>
            <div class="emoji-item" onclick="addEmoji('✨')">✨</div>
            <div class="emoji-item" onclick="addEmoji('🎯')">🎯</div>
        </div>
    </div>

    <!-- 图片上传 -->
    <div class="image-section fade-in">
        <div class="section-title">📷 添加图片</div>
        <div class="image-upload" onclick="triggerImageUpload()">
            <div class="upload-icon">📷</div>
            <div class="upload-text">点击上传图片</div>
        </div>
        <div class="image-preview" id="imagePreview">
            <img class="preview-image" id="previewImage" src="" alt="预览图片">
            <button class="post-btn" onclick="removeImage()" style="margin-top: 8px; background: var(--error-red);">删除图片</button>
        </div>
        <input type="file" id="imageUpload" accept="image/*" style="display: none;">
    </div>

    <!-- 底部导航栏 -->
    <div class="bottom-nav">
        <div class="nav-item" onclick="goToPage('index.html')">
            <div class="nav-icon">🏠</div>
            <div class="nav-text">首页</div>
        </div>
        <div class="nav-item" onclick="goToPage('bet-list.html')">
            <div class="nav-icon">🎯</div>
            <div class="nav-text">赌约</div>
        </div>
        <div class="nav-item" onclick="goToPage('group-list.html')">
            <div class="nav-icon">👥</div>
            <div class="nav-text">小组</div>
        </div>
        <div class="nav-item" onclick="goToPage('record.html')">
            <div class="nav-icon">📊</div>
            <div class="nav-text">记录</div>
        </div>
        <div class="nav-item" onclick="goToPage('profile.html')">
            <div class="nav-icon">👤</div>
            <div class="nav-text">我的</div>
        </div>
    </div>

    <script>
        // 返回上一页
        function goBack() {
            window.history.back();
        }

        // 页面跳转
        function goToPage(page) {
            window.location.href = page;
        }

        // 添加表情
        function addEmoji(emoji) {
            const textarea = document.getElementById('activityContent');
            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;
            const text = textarea.value;
            
            textarea.value = text.substring(0, start) + emoji + text.substring(end);
            textarea.focus();
            textarea.setSelectionRange(start + emoji.length, start + emoji.length);
            
            updateCharCount();
            validateForm();
        }

        // 更新字符计数
        function updateCharCount() {
            const textarea = document.getElementById('activityContent');
            const charCount = document.getElementById('charCount');
            const count = textarea.value.length;
            
            charCount.textContent = `${count}/500`;
            
            if (count > 450) {
                charCount.className = 'char-count warning';
            } else if (count > 490) {
                charCount.className = 'char-count error';
            } else {
                charCount.className = 'char-count';
            }
        }

        // 验证表单
        function validateForm() {
            const content = document.getElementById('activityContent').value.trim();
            const postBtn = document.getElementById('postBtn');
            
            if (content.length > 0 && content.length <= 500) {
                postBtn.disabled = false;
            } else {
                postBtn.disabled = true;
            }
        }

        // 触发图片上传
        function triggerImageUpload() {
            document.getElementById('imageUpload').click();
        }

        // 预览图片
        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('previewImage').src = e.target.result;
                    document.getElementById('imagePreview').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        }

        // 删除图片
        function removeImage() {
            document.getElementById('previewImage').src = '';
            document.getElementById('imagePreview').style.display = 'none';
            document.getElementById('imageUpload').value = '';
        }

        // 发布动态
        function postActivity() {
            const content = document.getElementById('activityContent').value.trim();
            
            if (!content) {
                alert('请输入动态内容');
                return;
            }
            
            alert('动态发布成功！');
            
            // 跳转回小组详情页面
            setTimeout(() => {
                window.location.href = 'group-detail.html';
            }, 1000);
        }

        // 实时验证表单
        document.getElementById('activityContent').addEventListener('input', function() {
            updateCharCount();
            validateForm();
        });

        // 图片上传事件
        document.getElementById('imageUpload').addEventListener('change', previewImage);

        // 底部导航交互
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.nav-item').forEach(nav => {
                    nav.classList.remove('active');
                });
                this.classList.add('active');
            });
        });

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            updateCharCount();
            validateForm();
        });
    </script>
</body>
</html>
