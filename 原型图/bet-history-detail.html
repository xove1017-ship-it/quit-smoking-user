<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>历史赌约详情 - 戒烟小程序</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #1ABC9C;
            --accent-orange: #F39C12;
            --text-dark: #2C3E50;
            --text-gray: #5D6D7E;
            --background-light: #F8F9FA;
            --white: #FFFFFF;
            --success-green: #27AE60;
            --error-red: #E74C3C;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--background-light);
            color: var(--text-dark);
            min-height: 100vh;
            padding-bottom: 60px;
        }

        /* 沉浸式状态栏 */
        .status-bar {
            background: var(--primary-color);
            color: var(--white);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        /* 页面头部 */
        .page-header {
            background: var(--white);
            padding: 16px 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .page-title {
            font-size: 18px;
            font-weight: 600;
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            color: var(--text-gray);
        }

        /* 赌约基本信息 */
        .bet-info {
            background: var(--white);
            padding: 20px;
            margin-bottom: 12px;
        }

        .bet-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .bet-opponent {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .opponent-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--primary-color);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-size: 18px;
        }

        .opponent-info {
            display: flex;
            flex-direction: column;
        }

        .opponent-name {
            font-size: 16px;
            font-weight: 600;
        }

        .bet-period {
            font-size: 14px;
            color: var(--text-gray);
        }

        .bet-status {
            font-size: 14px;
            padding: 6px 12px;
            border-radius: 16px;
            background: var(--success-green);
            color: var(--white);
            font-weight: 600;
        }

        .bet-status.losing {
            background: var(--error-red);
        }

        .bet-status.completed {
            background: var(--text-gray);
        }

        .bet-stake {
            font-size: 16px;
            font-weight: 600;
            color: var(--accent-orange);
            text-align: center;
            margin-bottom: 16px;
        }

        /* 最终结果 */
        .final-result {
            background: var(--white);
            padding: 20px;
            margin-bottom: 12px;
            text-align: center;
        }

        .result-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .result-desc {
            font-size: 18px;
            font-weight: 600;
            color: var(--success-green);
            margin-bottom: 20px;
        }

        .result-stake {
            font-size: 16px;
            color: var(--accent-orange);
            margin-bottom: 16px;
        }

        /* 统计信息 */
        .stats-section {
            background: var(--white);
            padding: 20px;
            margin-bottom: 12px;
        }

        .stats-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .stat-item {
            text-align: center;
            padding: 16px;
            background: var(--background-light);
            border-radius: 8px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-gray);
        }

        /* 时间线 */
        .timeline-section {
            background: var(--white);
            padding: 20px;
            margin-bottom: 12px;
        }

        .timeline-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .timeline {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .timeline-day {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .day-number {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--background-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-gray);
        }

        .day-status {
            flex: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: var(--background-light);
            border-radius: 8px;
        }

        .status-icons {
            display: flex;
            gap: 8px;
        }

        .status-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .status-icon.checked {
            background: var(--success-green);
            color: var(--white);
        }

        .status-icon.smoked {
            background: var(--error-red);
            color: var(--white);
        }

        .status-icon.pending {
            background: var(--text-gray);
            color: var(--white);
        }

        .day-time {
            font-size: 12px;
            color: var(--text-gray);
        }

        /* 见证人 */
        .witnesses-section {
            background: var(--white);
            padding: 20px;
            margin-bottom: 12px;
        }

        .witnesses-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .witnesses-list {
            display: flex;
            gap: 12px;
        }

        .witness-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .witness-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary-color);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-size: 14px;
            margin-bottom: 4px;
        }

        .witness-name {
            font-size: 12px;
            color: var(--text-gray);
        }

        /* 操作按钮 */
        .action-buttons {
            background: var(--white);
            padding: 20px;
            margin-bottom: 12px;
        }

        .action-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 8px;
            transition: all 0.3s ease;
        }

        .action-btn.primary {
            background: var(--primary-color);
            color: var(--white);
        }

        .action-btn.secondary {
            background: var(--background-light);
            color: var(--text-gray);
        }

        /* 底部导航栏 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--white);
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            border-top: 1px solid #eee;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 8px 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 8px;
            min-width: 60px;
            color: var(--text-gray);
        }

        .nav-item.active {
            color: var(--primary-color);
        }

        .nav-icon {
            font-size: 20px;
            margin-bottom: 4px;
            font-weight: 300;
        }

        .nav-text {
            font-size: 10px;
        }
    </style>
</head>
<body>
    <!-- 沉浸式状态栏 -->
    <div class="status-bar">
        <span>9:41</span>
        <div>📶 100% 🔋</div>
    </div>

    <!-- 页面头部 -->
    <div class="page-header">
        <button class="back-btn" onclick="goBack()">← 返回</button>
        <div class="page-title">历史赌约详情</div>
        <div style="width: 40px;"></div>
    </div>

    <!-- 赌约基本信息 -->
    <div class="bet-info">
        <div class="bet-header">
            <div class="bet-opponent">
                <div class="opponent-avatar">王</div>
                <div class="opponent-info">
                    <div class="opponent-name">王强</div>
                    <div class="bet-period">7天挑战 · 已结束</div>
                </div>
            </div>
            <div class="bet-status">挑战成功</div>
        </div>
        <div class="bet-stake">赌注：请吃火锅</div>
        <div class="bet-participants" style="display: flex; align-items: center; gap: 8px; margin-top: 12px; font-size: 14px; color: var(--text-gray);">
            <span>参与人：</span>
            <div style="display: flex; gap: 4px;">
                <div style="width: 24px; height: 24px; border-radius: 50%; background: var(--primary-color); display: flex; align-items: center; justify-content: center; color: var(--white); font-size: 12px;">我</div>
                <div style="width: 24px; height: 24px; border-radius: 50%; background: var(--accent-orange); display: flex; align-items: center; justify-content: center; color: var(--white); font-size: 12px;">王</div>
            </div>
        </div>
    </div>

    <!-- 最终结果 -->
    <div class="final-result">
        <div class="result-title">🎉 挑战结果</div>
        <div class="result-desc">恭喜！您成功完成了7天戒烟挑战</div>
        <div class="result-stake">王强已兑现约定：请吃火锅</div>
    </div>

    <!-- 统计信息 -->
    <div class="stats-section">
        <div class="stats-title">📊 挑战统计</div>
        <div class="stats-grid">
            <div class="stat-item">
                <div class="stat-value">7</div>
                <div class="stat-label">挑战天数</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">6</div>
                <div class="stat-label">无烟天数</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">1</div>
                <div class="stat-label">吸烟天数</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">85.7%</div>
                <div class="stat-label">成功率</div>
            </div>
        </div>
    </div>

    <!-- 时间线 -->
    <div class="timeline-section">
        <div class="timeline-title">📅 打卡时间线</div>
        <div class="timeline">
            <div class="timeline-day">
                <div class="day-number">7</div>
                <div class="day-status">
                    <div class="status-icons">
                        <div class="status-icon checked">✓</div>
                        <div class="status-icon checked">✓</div>
                    </div>
                    <div class="day-time">第7天 18:30</div>
                </div>
            </div>
            <div class="timeline-day">
                <div class="day-number">6</div>
                <div class="day-status">
                    <div class="status-icons">
                        <div class="status-icon checked">✓</div>
                        <div class="status-icon checked">✓</div>
                    </div>
                    <div class="day-time">第6天 19:15</div>
                </div>
            </div>
            <div class="timeline-day">
                <div class="day-number">5</div>
                <div class="day-status">
                    <div class="status-icons">
                        <div class="status-icon checked">✓</div>
                        <div class="status-icon smoked">✗</div>
                    </div>
                    <div class="day-time">第5天 20:00</div>
                </div>
            </div>
            <div class="timeline-day">
                <div class="day-number">4</div>
                <div class="day-status">
                    <div class="status-icons">
                        <div class="status-icon checked">✓</div>
                        <div class="status-icon checked">✓</div>
                    </div>
                    <div class="day-time">第4天 17:45</div>
                </div>
            </div>
            <div class="timeline-day">
                <div class="day-number">3</div>
                <div class="day-status">
                    <div class="status-icons">
                        <div class="status-icon checked">✓</div>
                        <div class="status-icon checked">✓</div>
                    </div>
                    <div class="day-time">第3天 18:20</div>
                </div>
            </div>
            <div class="timeline-day">
                <div class="day-number">2</div>
                <div class="day-status">
                    <div class="status-icons">
                        <div class="status-icon checked">✓</div>
                        <div class="status-icon checked">✓</div>
                    </div>
                    <div class="day-time">第2天 19:00</div>
                </div>
            </div>
            <div class="timeline-day">
                <div class="day-number">1</div>
                <div class="day-status">
                    <div class="status-icons">
                        <div class="status-icon checked">✓</div>
                        <div class="status-icon checked">✓</div>
                    </div>
                    <div class="day-time">第1天 18:45</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 见证人 -->
    <div class="witnesses-section">
        <div class="witnesses-title">👥 见证人</div>
        <div class="witnesses-list">
            <div class="witness-item">
                <div class="witness-avatar">李</div>
                <div class="witness-name">李华</div>
            </div>
        </div>
    </div>

    <!-- 操作按钮 -->
    <div class="action-buttons">
        <button class="action-btn primary" onclick="createNewBet()">创建新赌约</button>
        <button class="action-btn secondary" onclick="shareResult()">分享结果</button>
    </div>

    <!-- 底部导航栏 -->
    <div class="bottom-nav">
        <div class="nav-item" onclick="goToPage('index.html')">
            <div class="nav-icon">🏠</div>
            <div class="nav-text">首页</div>
        </div>
        <div class="nav-item" onclick="goToPage('bet-list.html')">
            <div class="nav-icon">🎯</div>
            <div class="nav-text">赌约</div>
        </div>
        <div class="nav-item" onclick="goToPage('group-list.html')">
            <div class="nav-icon">👥</div>
            <div class="nav-text">小组</div>
        </div>
        <div class="nav-item" onclick="goToPage('record.html')">
            <div class="nav-icon">📊</div>
            <div class="nav-text">记录</div>
        </div>
        <div class="nav-item" onclick="goToPage('profile.html')">
            <div class="nav-icon">👤</div>
            <div class="nav-text">我的</div>
        </div>
    </div>

    <script>
        // 页面跳转
        function goToPage(page) {
            window.location.href = page;
        }

        function goBack() {
            window.history.back();
        }

        // 创建新赌约
        function createNewBet() {
            window.location.href = 'bet-type-select.html';
        }

        // 分享结果
        function shareResult() {
            alert('已生成分享链接，可以分享给朋友');
        }

        // 编辑赌约
        function editBet() {
            window.location.href = 'bet-edit.html';
        }
    </script>
</body>
</html>
