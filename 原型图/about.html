<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关于我们 - 戒烟小程序</title>
    <style>
        :root {
            --primary-color: #1ABC9C;
            --secondary-color: #16A085;
            --white: #FFFFFF;
            --text-dark: #333333;
            --text-gray: #666666;
            --border-color: #E0E0E0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #F5F5F5;
            color: var(--text-dark);
            line-height: 1.6;
        }

        .container {
            max-width: 100%;
            min-height: 100vh;
            padding: 0;
        }

        .header {
            background: var(--primary-color);
            color: var(--white);
            padding: 16px;
            text-align: center;
            position: relative;
        }

        .back-btn {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--white);
            font-size: 18px;
            cursor: pointer;
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
        }

        .content {
            padding: 16px;
        }

        .app-info {
            background: var(--white);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .app-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .app-name {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .app-version {
            font-size: 14px;
            color: var(--text-gray);
            margin-bottom: 16px;
        }

        .app-desc {
            font-size: 14px;
            color: var(--text-gray);
            line-height: 1.6;
        }

        .info-section {
            background: var(--white);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--primary-color);
        }

        .info-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 8px;
            background: rgba(26, 188, 156, 0.05);
        }

        .info-icon {
            font-size: 18px;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(26, 188, 156, 0.1);
        }

        .info-content {
            flex: 1;
        }

        .info-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .info-desc {
            font-size: 12px;
            color: var(--text-gray);
        }

        .contact-section {
            background: var(--white);
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 8px;
            background: rgba(26, 188, 156, 0.05);
            margin-bottom: 8px;
        }

        .contact-item:last-child {
            margin-bottom: 0;
        }

        .contact-icon {
            font-size: 18px;
        }

        .contact-text {
            font-size: 14px;
            color: var(--text-dark);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-btn" onclick="goBack()">←</button>
            <div class="header-title">关于我们</div>
        </div>

        <div class="content">
            <!-- 应用信息 -->
            <div class="app-info">
                <div class="app-icon">🚭</div>
                <div class="app-name">戒烟小程序</div>
                <div class="app-version">版本 1.0.0</div>
                <div class="app-desc">
                    专注于帮助用户成功戒烟的健康管理应用，
                    通过科学的激励机制和社区支持，
                    让戒烟之路不再孤单。
                </div>
            </div>

            <!-- 功能介绍 -->
            <div class="info-section">
                <div class="section-title">🌟 主要功能</div>
                <div class="info-list">
                    <div class="info-item">
                        <div class="info-icon">📊</div>
                        <div class="info-content">
                            <div class="info-title">戒烟记录</div>
                            <div class="info-desc">详细记录戒烟天数、成功率等数据</div>
                        </div>
                    </div>
                    <div class="info-item">
                        <div class="info-icon">🎖️</div>
                        <div class="info-content">
                            <div class="info-title">勋章系统</div>
                            <div class="info-desc">通过勋章激励用户坚持控烟</div>
                        </div>
                    </div>
                    <div class="info-item">
                        <div class="info-icon">👥</div>
                        <div class="info-content">
                            <div class="info-title">小组互助</div>
                            <div class="info-desc">加入戒烟小组，互相鼓励支持</div>
                        </div>
                    </div>
                    <div class="info-item">
                        <div class="info-icon">💰</div>
                        <div class="info-content">
                            <div class="info-title">赌约挑战</div>
                            <div class="info-desc">通过赌约增加戒烟动力</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 联系我们 -->
            <div class="contact-section">
                <div class="section-title">📞 联系我们</div>
                <div class="contact-item">
                    <div class="contact-icon">📧</div>
                    <div class="contact-text">邮箱：support@jieyan.com</div>
                </div>
                <div class="contact-item">
                    <div class="contact-icon">📱</div>
                    <div class="contact-text">客服热线：400-123-4567</div>
                </div>
                <div class="contact-item">
                    <div class="contact-icon">🌐</div>
                    <div class="contact-text">官方网站：www.jieyan.com</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function goBack() {
            window.history.back();
        }

        function goToPage(page) {
            window.location.href = page;
        }
    </script>
</body>
</html>
