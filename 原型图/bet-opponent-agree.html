<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赌约邀请 - 戒烟小程序</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #1ABC9C;
            --accent-orange: #F39C12;
            --text-dark: #2C3E50;
            --text-gray: #5D6D7E;
            --background-light: #F8F9FA;
            --white: #FFFFFF;
            --success-green: #27AE60;
            --error-red: #E74C3C;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--background-light);
            color: var(--text-dark);
            min-height: 100vh;
            padding-bottom: 60px;
        }

        /* 沉浸式状态栏 */
        .status-bar {
            background: var(--primary-color);
            color: var(--white);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        /* 页面头部 */
        .page-header {
            background: var(--white);
            padding: 16px 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .page-title {
            font-size: 18px;
            font-weight: 600;
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            color: var(--text-gray);
        }

        /* 邀请信息 */
        .invite-info {
            background: var(--white);
            padding: 20px;
            margin-bottom: 12px;
            text-align: center;
        }

        .invite-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--primary-color);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-size: 32px;
            margin: 0 auto 16px;
        }

        .invite-name {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .invite-desc {
            font-size: 14px;
            color: var(--text-gray);
            margin-bottom: 20px;
        }

        /* 赌约详情 */
        .bet-details {
            background: var(--white);
            padding: 20px;
            margin-bottom: 12px;
        }

        .details-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .detail-label {
            color: var(--text-gray);
        }

        .detail-value {
            font-weight: 600;
        }

        /* 操作按钮 */
        .action-buttons {
            background: var(--white);
            padding: 20px;
            margin-bottom: 12px;
        }

        .action-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 12px;
            transition: all 0.3s ease;
        }

        .action-btn.primary {
            background: var(--primary-color);
            color: var(--white);
        }

        .action-btn.primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .action-btn.secondary {
            background: var(--background-light);
            color: var(--text-gray);
        }

        .action-btn.secondary:hover {
            background: var(--text-gray);
            color: var(--white);
        }

        /* 底部导航栏 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--white);
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            border-top: 1px solid #eee;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 8px 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 8px;
            min-width: 60px;
            color: var(--text-gray);
        }

        .nav-item.active {
            color: var(--primary-color);
        }

        .nav-icon {
            font-size: 20px;
            margin-bottom: 4px;
            font-weight: 300;
        }

        .nav-text {
            font-size: 10px;
        }

        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: var(--white);
            border-radius: 16px;
            padding: 24px;
            max-width: 300px;
            width: 90%;
            text-align: center;
            animation: slideUp 0.3s ease-out;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-dark);
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .modal-btn.cancel {
            background: var(--background-light);
            color: var(--text-gray);
        }

        .modal-btn.confirm {
            background: var(--primary-color);
            color: var(--white);
        }

        /* 动画效果 */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <!-- 沉浸式状态栏 -->
    <div class="status-bar">
        <span>9:41</span>
        <div>📶 100% 🔋</div>
    </div>

    <!-- 页面头部 -->
    <div class="page-header">
        <button class="back-btn" onclick="goBack()">← 返回</button>
        <div class="page-title">赌约邀请</div>
        <div style="width: 40px;"></div>
    </div>

    <!-- 邀请信息 -->
    <div class="invite-info">
        <div class="invite-avatar">李</div>
        <div class="invite-name">李明</div>
        <div class="invite-desc">邀请您参与戒烟挑战</div>
    </div>

    <!-- 赌约详情 -->
    <div class="bet-details">
        <div class="details-title">📋 赌约详情</div>
        <div class="detail-item">
            <span class="detail-label">挑战类型：</span>
            <span class="detail-value">2人对决</span>
        </div>
        <div class="detail-item">
            <span class="detail-label">挑战周期：</span>
            <span class="detail-value">7天</span>
        </div>
        <div class="detail-item">
            <span class="detail-label">开始时间：</span>
            <span class="detail-value">今天开始</span>
        </div>
        <div class="detail-item">
            <span class="detail-label">口头约定：</span>
            <span class="detail-value">输的人请赢的人吃饭</span>
        </div>
        <div class="detail-item">
            <span class="detail-label">见证人：</span>
            <span class="detail-value">李华、张伟</span>
        </div>
    </div>

    <!-- 操作按钮 -->
    <div class="action-buttons">
        <button class="action-btn primary" onclick="acceptBet()">接受挑战</button>
        <button class="action-btn secondary" onclick="declineBet()">拒绝挑战</button>
    </div>

    <!-- 接受确认模态框 -->
    <div class="modal" id="acceptModal">
        <div class="modal-content">
            <div class="modal-title">确认接受挑战</div>
            <div style="margin-bottom: 20px; font-size: 14px; color: var(--text-gray);">
                接受后将开始7天戒烟挑战<br>
                一旦接受无法取消
            </div>
            <div class="modal-buttons">
                <button class="modal-btn cancel" onclick="closeModal('acceptModal')">再想想</button>
                <button class="modal-btn confirm" onclick="confirmAccept()">确认接受</button>
            </div>
        </div>
    </div>

    <!-- 拒绝确认模态框 -->
    <div class="modal" id="declineModal">
        <div class="modal-content">
            <div class="modal-title">确认拒绝挑战</div>
            <div style="margin-bottom: 20px; font-size: 14px; color: var(--text-gray);">
                拒绝后将无法参与此赌约<br>
                确定要拒绝吗？
            </div>
            <div class="modal-buttons">
                <button class="modal-btn cancel" onclick="closeModal('declineModal')">再想想</button>
                <button class="modal-btn confirm" onclick="confirmDecline()">确认拒绝</button>
            </div>
        </div>
    </div>

    <!-- 底部导航栏 -->
    <div class="bottom-nav">
        <div class="nav-item" onclick="goToPage('index.html')">
            <div class="nav-icon">🏠</div>
            <div class="nav-text">首页</div>
        </div>
        <div class="nav-item" onclick="goToPage('bet-list.html')">
            <div class="nav-icon">🎯</div>
            <div class="nav-text">赌约</div>
        </div>
        <div class="nav-item" onclick="goToPage('group-list.html')">
            <div class="nav-icon">👥</div>
            <div class="nav-text">小组</div>
        </div>
        <div class="nav-item" onclick="goToPage('record.html')">
            <div class="nav-icon">📊</div>
            <div class="nav-text">记录</div>
        </div>
        <div class="nav-item" onclick="goToPage('profile.html')">
            <div class="nav-icon">👤</div>
            <div class="nav-text">我的</div>
        </div>
    </div>

    <script>
        // 页面跳转
        function goToPage(page) {
            window.location.href = page;
        }

        function goBack() {
            window.history.back();
        }

        // 接受挑战
        function acceptBet() {
            document.getElementById('acceptModal').style.display = 'flex';
        }

        // 拒绝挑战
        function declineBet() {
            document.getElementById('declineModal').style.display = 'flex';
        }

        // 确认接受
        function confirmAccept() {
            alert('挑战已接受！赌约正式开始');
            closeModal('acceptModal');
            // 跳转到赌约详情页面
            setTimeout(() => {
                window.location.href = 'bet-detail.html';
            }, 1000);
        }

        // 确认拒绝
        function confirmDecline() {
            alert('挑战已拒绝');
            closeModal('declineModal');
            // 返回首页
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1000);
        }

        // 关闭模态框
        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        // 点击模态框背景关闭
        document.addEventListener('click', function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.style.display = 'none';
            }
        });
    </script>
</body>
</html>
