<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置 - 戒烟小程序</title>
    <style>
        :root {
            --primary-color: #1ABC9C;
            --secondary-color: #16A085;
            --white: #FFFFFF;
            --text-dark: #333333;
            --text-gray: #666666;
            --border-color: #E0E0E0;
            --success-green: #27AE60;
            --warning-orange: #F39C12;
            --danger-red: #E74C3C;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #F5F5F5;
            color: var(--text-dark);
            line-height: 1.6;
        }

        .container {
            max-width: 100%;
            min-height: 100vh;
            padding: 0;
        }

        /* 头部 */
        .header {
            background: var(--primary-color);
            color: var(--white);
            padding: 16px;
            text-align: center;
            position: relative;
        }

        .back-btn {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--white);
            font-size: 18px;
            cursor: pointer;
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
        }

        /* 内容区域 */
        .content {
            padding: 16px;
            padding-bottom: 80px;
        }

        /* 设置项 */
        .settings-list {
            display: flex;
            flex-direction: column;
            gap: 0;
            background: var(--white);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .setting-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .setting-item:last-child {
            border-bottom: none;
        }

        .setting-item:hover {
            background: rgba(26, 188, 156, 0.05);
        }

        .setting-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .setting-icon {
            font-size: 18px;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            background: rgba(26, 188, 156, 0.1);
        }

        .setting-text {
            flex: 1;
        }

        .setting-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .setting-desc {
            font-size: 12px;
            color: var(--text-gray);
        }

        .setting-arrow {
            font-size: 14px;
            color: var(--text-gray);
        }

        /* 开关样式 */
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--primary-color);
        }

        input:checked + .slider:before {
            transform: translateX(20px);
        }

        /* 底部导航 */
        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--white);
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            border-top: 1px solid var(--border-color);
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .nav-item:hover {
            background: rgba(26, 188, 156, 0.1);
        }

        .nav-icon {
            font-size: 20px;
        }

        .nav-text {
            font-size: 10px;
        }

        .nav-item.active {
            color: var(--primary-color);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <button class="back-btn" onclick="goBack()">←</button>
            <div class="header-title">设置</div>
        </div>

        <!-- 内容区域 -->
        <div class="content">
            <div class="settings-list">
                <!-- 账号设置 -->
                <div class="setting-item" onclick="goToPage('account.html')">
                    <div class="setting-info">
                        <div class="setting-icon">👤</div>
                        <div class="setting-text">
                            <div class="setting-title">账号设置</div>
                            <div class="setting-desc">修改个人信息、密码等</div>
                        </div>
                    </div>
                    <div class="setting-arrow">›</div>
                </div>

                <!-- 通知设置 -->
                <div class="setting-item">
                    <div class="setting-info">
                        <div class="setting-icon">🔔</div>
                        <div class="setting-text">
                            <div class="setting-title">通知设置</div>
                            <div class="setting-desc">管理推送通知</div>
                        </div>
                    </div>
                    <label class="switch">
                        <input type="checkbox" checked>
                        <span class="slider"></span>
                    </label>
                </div>

                <!-- 隐私设置 -->
                <div class="setting-item" onclick="goToPage('privacy.html')">
                    <div class="setting-info">
                        <div class="setting-icon">🔒</div>
                        <div class="setting-text">
                            <div class="setting-title">隐私设置</div>
                            <div class="setting-desc">管理数据权限</div>
                        </div>
                    </div>
                    <div class="setting-arrow">›</div>
                </div>

                <!-- 关于我们 -->
                <div class="setting-item" onclick="goToPage('about.html')">
                    <div class="setting-info">
                        <div class="setting-icon">ℹ️</div>
                        <div class="setting-text">
                            <div class="setting-title">关于我们</div>
                            <div class="setting-desc">版本信息、帮助中心</div>
                        </div>
                    </div>
                    <div class="setting-arrow">›</div>
                </div>

                <!-- 反馈建议 -->
                <div class="setting-item" onclick="goToPage('feedback.html')">
                    <div class="setting-info">
                        <div class="setting-icon">💬</div>
                        <div class="setting-text">
                            <div class="setting-title">反馈建议</div>
                            <div class="setting-desc">遇到问题？告诉我们</div>
                        </div>
                    </div>
                    <div class="setting-arrow">›</div>
                </div>

                <!-- 清除缓存 -->
        <div class="setting-item" onclick="clearCache()">
            <div class="setting-info">
                <div class="setting-icon">🗑️</div>
                <div class="setting-text">
                    <div class="setting-title">清除缓存</div>
                    <div class="setting-desc">释放存储空间</div>
                </div>
            </div>
            <div class="setting-arrow">›</div>
        </div>
            </div>
        </div>

        <!-- 底部导航 -->
        <div class="nav-bar">
            <div class="nav-item" onclick="goToPage('index.html')">
                <div class="nav-icon">🏠</div>
                <div class="nav-text">首页</div>
            </div>
            <div class="nav-item" onclick="goToPage('group.html')">
                <div class="nav-icon">👥</div>
                <div class="nav-text">小组</div>
            </div>
            <div class="nav-item" onclick="goToPage('bet.html')">
                <div class="nav-icon">💰</div>
                <div class="nav-text">赌约</div>
            </div>
            <div class="nav-item" onclick="goToPage('record.html')">
                <div class="nav-icon">📊</div>
                <div class="nav-text">记录</div>
            </div>
            <div class="nav-item active" onclick="goToPage('profile.html')">
                <div class="nav-icon">👤</div>
                <div class="nav-text">我的</div>
            </div>
        </div>
    </div>

    <script>
        function goBack() {
            window.history.back();
        }

        function goToPage(page) {
            window.location.href = page;
        }

        function clearCache() {
            localStorage.clear();
            alert('缓存清除成功！');
        }

        // 页面加载动画
        document.addEventListener('DOMContentLoaded', function() {
            const elements = document.querySelectorAll('.setting-item');
            elements.forEach((el, index) => {
                el.style.opacity = '0';
                el.style.transform = 'translateX(-20px)';
                setTimeout(() => {
                    el.style.opacity = '1';
                    el.style.transform = 'translateX(0)';
                    el.style.transition = 'all 0.5s ease';
                }, index * 100);
            });
        });
    </script>
</body>
</html>
