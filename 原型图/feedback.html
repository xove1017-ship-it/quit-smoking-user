<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>反馈建议 - 戒烟小程序</title>
    <style>
        :root {
            --primary-color: #1ABC9C;
            --secondary-color: #16A085;
            --white: #FFFFFF;
            --text-dark: #333333;
            --text-gray: #666666;
            --border-color: #E0E0E0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #F5F5F5;
            color: var(--text-dark);
            line-height: 1.6;
        }

        .container {
            max-width: 100%;
            min-height: 100vh;
            padding: 0;
        }

        .header {
            background: var(--primary-color);
            color: var(--white);
            padding: 16px;
            text-align: center;
            position: relative;
        }

        .back-btn {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--white);
            font-size: 18px;
            cursor: pointer;
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
        }

        .content {
            padding: 16px;
        }

        .feedback-form {
            background: var(--white);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-dark);
        }

        .form-input, .form-textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
        }

        .form-textarea {
            min-height: 120px;
        }

        .form-input:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(26, 188, 156, 0.1);
        }

        .submit-btn {
            width: 100%;
            background: var(--primary-color);
            color: var(--white);
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            background: #16A085;
            transform: translateY(-1px);
        }

        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .faq-section {
            background: var(--white);
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--primary-color);
        }

        .faq-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .faq-item {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
        }

        .faq-question {
            padding: 12px;
            background: rgba(26, 188, 156, 0.05);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .faq-answer {
            padding: 12px;
            font-size: 13px;
            color: var(--text-gray);
            line-height: 1.6;
            display: none;
        }

        .faq-item.active .faq-answer {
            display: block;
        }

        .faq-arrow {
            transition: transform 0.3s ease;
        }

        .faq-item.active .faq-arrow {
            transform: rotate(180deg);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-btn" onclick="goBack()">←</button>
            <div class="header-title">反馈建议</div>
        </div>

        <div class="content">
            <!-- 反馈表单 -->
            <div class="feedback-form">
                <div class="form-group">
                    <label class="form-label">反馈类型</label>
                    <select class="form-input">
                        <option value="">请选择反馈类型</option>
                        <option value="bug">功能异常</option>
                        <option value="suggestion">功能建议</option>
                        <option value="improvement">体验优化</option>
                        <option value="other">其他问题</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">反馈内容</label>
                    <textarea class="form-textarea" placeholder="请详细描述您遇到的问题或建议..."></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">联系方式（选填）</label>
                    <input type="text" class="form-input" placeholder="邮箱或手机号">
                </div>

                <button class="submit-btn" onclick="submitFeedback()">提交反馈</button>
            </div>

            <!-- 常见问题 -->
            <div class="faq-section">
                <div class="section-title">❓ 常见问题</div>
                <div class="faq-list">
                    <div class="faq-item">
                        <div class="faq-question" onclick="toggleFAQ(this)">
                            如何获得勋章？
                            <span class="faq-arrow">▼</span>
                        </div>
                        <div class="faq-answer">
                            连续7天控烟成功即可获得一枚银勋章。集齐10枚银勋章可升级为金勋章，集齐10枚金勋章可升级为五彩勋章。
                        </div>
                    </div>

                    <div class="faq-item">
                        <div class="faq-question" onclick="toggleFAQ(this)">
                            如何加入小组？
                            <span class="faq-arrow">▼</span>
                        </div>
                        <div class="faq-answer">
                            在小组页面可以查看所有公开小组，点击"加入小组"按钮即可参与。也可以创建自己的小组邀请好友加入。
                        </div>
                    </div>

                    <div class="faq-item">
                        <div class="faq-question" onclick="toggleFAQ(this)">
                            赌约如何参与？
                            <span class="faq-arrow">▼</span>
                        </div>
                        <div class="faq-answer">
                            在赌约页面选择感兴趣的挑战，点击"参与挑战"并按照提示完成报名。挑战期间需要按时打卡记录进度。
                        </div>
                    </div>

                    <div class="faq-item">
                        <div class="faq-question" onclick="toggleFAQ(this)">
                            数据会保存多久？
                            <span class="faq-arrow">▼</span>
                        </div>
                        <div class="faq-answer">
                            您的戒烟数据会永久保存，除非您主动清除缓存。建议定期备份重要数据。
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function goBack() {
            window.history.back();
        }

        function goToPage(page) {
            window.location.href = page;
        }

        function toggleFAQ(element) {
            const faqItem = element.parentElement;
            faqItem.classList.toggle('active');
        }

        function submitFeedback() {
            alert('感谢您的反馈！我们会尽快处理。');
            // 这里可以添加实际的提交逻辑
        }

        // 页面加载动画
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.querySelector('.feedback-form');
            form.style.opacity = '0';
            form.style.transform = 'translateY(20px)';
            setTimeout(() => {
                form.style.opacity = '1';
                form.style.transform = 'translateY(0)';
                form.style.transition = 'all 0.5s ease';
            }, 200);
        });
    </script>
</body>
</html>
